<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CritOps - Kill Team BattleKit</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ESTILOS DE ICONOS SVG OFICIALES -->
    <style>
        .icon-yes, .icon-no {
            display: inline-block;
            width: 1.2rem; 
            height: 1.2rem;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
            margin-right: 10px;
        }
        .icon-yes {
            background-image: url('resources/game_rules_files/yes.svg');
        }
        .icon-no {
            background-image: url('resources/game_rules_files/no.svg');
        }
    </style>
</head>
<body class="bg-light">

    <!-- Header -->
    <header class="navbar sticky-top bg-dark flex-md-nowrap p-0 shadow" data-bs-theme="dark">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6 text-white" href="index.html">
            <i class="bi bi-shield-shaded me-2"></i>Kill Team BattleKit
        </a>
        <div class="d-flex align-items-center">
            <button class="navbar-toggler d-md-none collapsed me-2" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Alternar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm" style="min-height: calc(100vh - 48px);">
                <div class="position-sticky pt-3">
                    <ul class="nav nav-pills flex-column" id="main-nav">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-dark" href="index.html">
                                <i class="bi bi-house-door me-2"></i> Inicio (Portada)
                            </a>
                        </li>
                        <hr class="my-2">
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="secuencia.html">
                                <i class="bi bi-sort-numeric-down me-2"></i> Secuencia de Juego
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active shadow-sm" href="critops.html">
                                <i class="bi bi-crosshair me-2"></i> CritOps
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="tacops.html">
                                <i class="bi bi-bookmark-star me-2"></i> TacOps
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="facciones.html">
                                <i class="bi bi-person-vcard me-2"></i> Reglas de Facción
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="reglas.html">
                                <i class="bi bi-book me-2"></i> Reglas de Juego
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="partidas.html">
                                <i class="bi bi-list-ol me-2"></i> Partidas
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-4 border-bottom">
                    <h1 class="h2" style="color: #ff5418;">Operaciones Críticas (CritOps)</h1>
                    <p class="text-muted mb-0 d-none d-md-block">Misiones principales compartidas</p>
                </div>

                <!-- Contenedor dinámico de Tarjetas CritOps -->
                <div id="critops-cards-container" class="row justify-content-center g-4">
                    <div class="text-center p-5">
                        <div class="spinner-border" style="color: #ff5418;" role="status">
                            <span class="visually-hidden">Cargando CritOps...</span>
                        </div>
                        <p class="mt-3 text-muted">Cargando misiones principales...</p>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script Principal para cargar CritOps -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('critops-cards-container');
            let allCritOps = {};

            // Petición al nuevo JSON de CritsOps
            fetch('./CritsOps.json')
                .then(response => {
                    if (!response.ok) throw new Error("No se pudo cargar el archivo JSON");
                    return response.json();
                })
                .then(data => {
                    allCritOps = data;
                    renderCritOps();
                })
                .catch(error => {
                    console.error("Error cargando CritOps:", error);
                    container.innerHTML = `<div class="alert alert-danger" role="alert">
                        Error al cargar la base de datos de CritOps. Asegúrate de que el archivo 'CritsOps.json' esté en la misma carpeta.
                    </div>`;
                });

            function renderCritOps() {
                container.innerHTML = '';
                
                for (const [key, op] of Object.entries(allCritOps)) {
                    container.innerHTML += generateCritOpCard(key, op);
                }
            }

            function generateCritOpCard(key, op) {
                // 1. Manejo de Reglas Adicionales (Opcional en el JSON)
                let additionalRulesHtml = '';
                if (op.aditional_rules) {
                    additionalRulesHtml = `
                        <div class="victory-points mb-3">
                            <div class="sub-header text-uppercase fw-bold border-bottom pb-1 mb-2 text-start">Reglas Adicionales</div>
                            <div class="small text-start text-muted lh-sm">${op.aditional_rules}</div>
                        </div>
                    `;
                }

                // 2. Manejo de la Acción de Misión solicitada por el usuario
                let actionHtml = '';
                // Como en el JSON viene como array, extraemos el primer elemento si existe
                if (op.action_mission && op.action_mission.length > 0) {
                    const am = op.action_mission[0];
                    if (am.action_mission_name) {
                        // Incorporamos la estructura pedida + las clases Bootstrap de Flexbox
                        actionHtml = `
                            <div class="sub-header mt-3 text-uppercase fw-bold border-bottom pb-1 mb-2 text-start">Acción de Misión</div>
                            <div class="unique-actions-section mb-3 shadow-sm rounded">
                                <div class="header d-flex justify-content-between align-items-center bg-dark text-white p-2 rounded-top">
                                    <div class="fw-bold">${am.action_mission_name}</div>
                                    <div class="ap-box bg-secondary px-2 rounded small">${am.action_mission_cost}</div>
                                </div>
                                <div class="content p-3 border border-top-0 rounded-bottom text-start small bg-white">
                                    ${am.action_mission_yes ? `
                                    <p class="mb-2 d-flex align-items-start">
                                        <span class="icon icon-yes flex-shrink-0 mt-1"></span> 
                                        <span>${am.action_mission_yes}</span>
                                    </p>` : ''}
                    
                                    ${am.action_mission_no ? `
                                    <p class="mb-0 d-flex align-items-start">
                                        <span class="icon icon-no flex-shrink-0 mt-1"></span> 
                                        <span>${am.action_mission_no}</span>
                                    </p>` : ''}
                                </div>
                            </div>
                        `;
                    }
                }

                // 3. Manejo de los Puntos de Victoria
                let vpHtml = '';
                if (op.victoy_points) {
                    vpHtml = `
                        <div class="victory-points mt-auto">
                            <div class="sub-header text-uppercase fw-bold border-bottom pb-1 mb-2 text-start">Puntos de Victoria</div>
                            <div class="small text-start lh-sm">${op.victoy_points}</div>
                        </div>
                    `;
                }

                // Generación de la Tarjeta final
                return `
                    <div class="col-xs-12 col-md-6 col-xl-4 text-center p-2 fade-in">
                        <div class="card shadow-sm h-100 border-0 bg-light">
                            <!-- Cabecera Naranja Exclusiva de CritOp -->
                            <div class="position-relative text-white p-2 rounded-top fw-bold d-flex align-items-center justify-content-center shadow-sm" style="background-color: #ff5418;">
                                <span>CRIT OP</span>
                            </div>
                            
                            <div class="p-3 d-flex flex-column h-100 bg-white border border-top-0 rounded-bottom">
                                <h4 class="name fw-bold text-dark mb-4">${op.name_es}</h4>
                                <div class="mission-container pt-0 flex-grow-1 d-flex flex-column">
                                    ${additionalRulesHtml}
                                    ${actionHtml}
                                    ${vpHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
