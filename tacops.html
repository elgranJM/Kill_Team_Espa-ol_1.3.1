<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacOps - Kill Team BattleKit</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="timeline.css">
</head>

<body class="bg-light">

    <!-- Header -->
    <header class="navbar sticky-top bg-dark flex-md-nowrap p-0 shadow" data-bs-theme="dark">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6 text-white" href="index.html">
            <i class="bi bi-shield-shaded me-2"></i>Kill Team BattleKit
        </a>
        <div class="d-flex align-items-center">
            <button class="navbar-toggler d-md-none collapsed me-2" type="button" data-bs-toggle="collapse"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false"
                aria-label="Alternar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm"
                style="min-height: calc(100vh - 48px);">
                <div class="position-sticky pt-3">
                    <ul class="nav nav-pills flex-column" id="main-nav">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-dark" href="index.html">
                                <i class="bi bi-house-door me-2"></i> Inicio (Portada)
                            </a>
                        </li>
                        <hr class="my-2">
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="secuencia.html">
                                <i class="bi bi-sort-numeric-down me-2"></i> Secuencia de Juego
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="critops.html">
                                <i class="bi bi-crosshair me-2"></i> CritOps
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active shadow-sm" href="tacops.html">
                                <i class="bi bi-bookmark-star-fill me-2"></i> TacOps
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="facciones.html">
                                <i class="bi bi-person-vcard me-2"></i> Reglas de Facción
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="reglas.html">
                                <i class="bi bi-book me-2"></i> Reglas de Juego
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="partidas.html">
                                <i class="bi bi-list-ol me-2"></i> Partidas
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-4 border-bottom">
                    <h1 class="h2 text-primary"><i class="bi bi-bookmark-star-fill me-3"></i>Misiones Secundarias
                        (TacOps)</h1>
                </div>

                <!-- Controles de Filtro -->
                <div class="bg-white p-4 rounded shadow-sm mb-4">
                    <div class="row align-items-center">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="tacopsFilterSelect" class="form-label fw-bold">Filtrar por Arquetipo:</label>
                            <select id="tacopsFilterSelect" class="form-select">
                                <option value="all" selected="selected">Todos los Arquetipos</option>
                                <option value="security">Seguridad</option>
                                <option value="seek-destroy">Buscar y Destruir</option>
                                <option value="recon">Reconocimiento</option>
                                <option value="infiltration">Infiltración</option>
                            </select>
                        </div>
                        <div class="col-md-6 text-md-end text-center">
                            <div class="form-check form-switch d-inline-block mt-md-4 pt-1">
                                <input class="form-check-input" type="checkbox" id="favTacopsSwitch"
                                    style="transform: scale(1.3);">
                                <label class="form-check-label ms-2 fw-bold" for="favTacopsSwitch">
                                    <i class="bi bi-heart-fill text-danger me-1"></i> Mostrar Solo Favoritos
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contenedor dinámico de Tarjetas TacOps -->
                <div id="tacops-cards-container" class="row justify-content-center">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando TacOps...</span>
                        </div>
                        <p class="mt-3 text-muted">Cargando base de datos táctica...</p>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script Principal -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('tacops-cards-container');
            const archetypeFilter = document.getElementById('tacopsFilterSelect');
            const favFilter = document.getElementById('favTacopsSwitch');

            let allTacOps = {};
            let favTacOps = JSON.parse(localStorage.getItem('favTacops')) || [];

            const archetypeDisplay = {
                'recon': 'Reconocimiento',
                'security': 'Seguridad',
                'infiltration': 'Infiltración',
                'seek-destroy': 'Buscar y Destruir'
            };

            fetch('./tacopsgenerales.json')
                .then(response => {
                    if (!response.ok) throw new Error("No se pudo cargar el archivo JSON");
                    return response.json();
                })
                .then(data => {
                    allTacOps = data;
                    renderTacOps();
                })
                .catch(error => {
                    console.error("Error cargando TacOps:", error);
                    container.innerHTML = `<div class="alert alert-danger" role="alert">
                        Error al cargar la base de datos de TacOps. Asegúrate de que el archivo 'tacopsgenerales.json' esté en la misma carpeta o de estar utilizando un servidor local.
                    </div>`;
                });

            function renderTacOps() {
                container.innerHTML = '';
                const selectedArchetype = archetypeFilter.value;
                const showOnlyFavs = favFilter.checked;
                let renderedCount = 0;

                for (const [key, op] of Object.entries(allTacOps)) {
                    const isFav = favTacOps.includes(key);
                    if (selectedArchetype !== 'all' && op.archetype !== selectedArchetype) continue;
                    if (showOnlyFavs && !isFav) continue;

                    renderedCount++;
                    container.innerHTML += generateCardHtml(key, op, isFav);
                }

                if (renderedCount === 0) {
                    container.innerHTML = `<div class="col-12 text-center p-5">
                        <i class="bi bi-clipboard-x text-muted" style="font-size: 3rem;"></i>
                        <p class="mt-3 text-muted">No se encontraron TacOps que coincidan con los filtros actuales.</p>
                    </div>`;
                }
            }

            function generateCardHtml(key, op, isFav) {
                const archName = archetypeDisplay[op.archetype] || op.archetype;
                const favIconClass = isFav ? 'bi-heart-fill text-white' : 'bi-heart text-white-50';

                let additionalRulesHtml = '';
                if (op.additional_rules) {
                    if (Array.isArray(op.additional_rules)) {
                        additionalRulesHtml = `<div class="victory-points"><div class="sub-header">Reglas Adicionales</div><ul>${op.additional_rules.map(r => `<li>${r}</li>`).join('')}</ul></div>`;
                    } else {
                        if (key === 'Flanco' || op.name === 'Flanco') {
                            additionalRulesHtml = `
                                <div class="victory-points">
                                    <div class="sub-header">Reglas Adicionales</div>
                                    <div class="row g-3 tacop-columns text-start">
                                        <div class="col-12 col-md-6"><p class="mb-0 text-muted small">${op.additional_rules}</p></div>
                                        <div class="col-12 col-md-6 text-center">
                                            <div class="bg-light border rounded p-2 text-muted small d-flex align-items-center justify-content-center" style="min-height: 100px;">
                                                <img src="./resources/tacops_files/flank_tacop-1.png" alt="Diagrama de Flanco (Reconocimiento)" class="img-fluid">
                                            </div>
                                            <p class="small mt-2 mb-0">P. ej., el Jugador 1 controla este flanco ya que el LPA total de los agentes del jugador 1 totalmente dentro del territorio del jugador 2 es mayor que el de los agentes del jugador 2 totalmente dentro del territorio del jugador 1.</p>
                                        </div>
                                    </div>
                                </div>`;
                        } else {
                            additionalRulesHtml = `<div class="victory-points"><div class="sub-header">Reglas Adicionales</div><p class="text-muted small mb-0">${op.additional_rules}</p></div>`;
                        }
                    }
                }

                let actionHtml = '';
                if (op.action_mission_name) {
                    actionHtml = `
                        <div class="sub-header mt-3">Acción de Misión</div>
                        <div class="unique-actions-section">
                            <div class="header">
                                <div>${op.action_mission_name}</div>
                                <div class="ap-box">${op.action_mission_cost}</div>
                            </div>
                            <div class="content">
                                ${op.action_mission_yes ? `
                                <p>
                                    <span class="icon icon-yes"></span> 
                                    <span>${op.action_mission_yes}</span>
                                </p>` : ''}
                
                                ${op.action_mission_no ? `
                                <p>
                                    <span class="icon icon-no"></span> 
                                    ${op.action_mission_no}
                                </p>` : ''}
                            </div>
                        </div>
                    `;
                }

                let vpHtml = '';
                if (op.victoy_points) {
                    if (Array.isArray(op.victoy_points)) {
                        const vpList = [...op.victoy_points];
                        let limitText = '';
                        if (vpList[vpList.length - 1] && vpList[vpList.length - 1].includes("No puedes obtener más de")) {
                            limitText = `<p class="fst-italic text-danger small mt-2 mb-0">${vpList.pop()}</p>`;
                        }
                        vpHtml = `<ul class="text-start small mb-1">${vpList.map(vp => `<li>${vp}</li>`).join('')}</ul>${limitText}`;
                    } else {
                        vpHtml = `<p class="small mb-0 text-start">${op.victoy_points}</p>`;
                    }
                }

                // AQUÍ SE INYECTA EL COLOR HEXADECIMAL: style="background-color: ${getCustomColor(op.archetype)};"
                return `
                    <div class="col-xs-12 col-md-6 col-lg-4 text-center p-2 tacop-container fade-in">
                        <div class="tacop card shadow-sm h-100 ${op.archetype} border-0">
                            <div class="archetype position-relative text-white p-2 rounded-top fw-bold d-flex align-items-center justify-content-center" style="background-color: ${getCustomColor(op.archetype)};">
                                <img src="${getArchetypeIcon(op.archetype)}" class="svg-white" alt="Icono ${archName}" style="width: 1.5rem; height: 1.5rem; margin-right: 8px;">
                                <span>${archName.toUpperCase()}</span>
                                <i class="gototacops bi ${favIconClass} position-absolute end-0 top-50 translate-middle-y me-3 cursor-pointer" 
                                   style="cursor: pointer; font-size: 1.2rem;" 
                                   onclick="window.toggleFavorite('${key}')" title="Favorito"></i>
                            </div>
                            <div class="middle p-3 d-flex flex-column h-100">
                                <h4 class="name fw-bold text-dark mb-3">${op.name}</h4>
                                <div class="mission-container pt-0 flex-grow-1">
                                    <div class="victory-points mb-3">
                                        <div class="sub-header text-uppercase fw-bold border-bottom pb-1 mb-2">Revelar</div>
                                        <div class="small text-start">${op.Reveal}</div>
                                    </div>
                                    ${additionalRulesHtml}
                                    ${actionHtml}
                                    <div class="victory-points mt-auto">
                                        <div class="sub-header text-uppercase fw-bold border-bottom pb-1 mb-2">Puntos de Victoria</div>
                                        ${vpHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // FUNCIÓN ACTUALIZADA CON COLORES HEX EXACTOS
            function getCustomColor(archetype) {
                switch (archetype) {
                    case 'recon': return '#f05c22';         // Naranja
                    case 'security': return '#0b6be1';      // Azul
                    case 'infiltration': return '#5f5f5f';  // Gris
                    case 'seek-destroy': return '#bd0003';  // Rojo
                    default: return '#6c757d';              // Gris fallback
                }
            }

            // NUEVA FUNCIÓN PARA OBTENER LA RUTA DEL SVG OFICIAL
            function getArchetypeIcon(archetype) {
                switch (archetype) {
                    case 'recon': return './resources/game_rules_files/recon.svg';
                    case 'security': return './resources/game_rules_files/security.svg';
                    case 'infiltration': return './resources/game_rules_files/infiltration.svg';
                    case 'seek-destroy': return './resources/game_rules_files/seek-destroy.svg';
                    default: return '';
                }
            }

            archetypeFilter.addEventListener('change', renderTacOps);
            favFilter.addEventListener('change', renderTacOps);

            window.toggleFavorite = function (key) {
                const index = favTacOps.indexOf(key);
                if (index > -1) favTacOps.splice(index, 1);
                else favTacOps.push(key);
                localStorage.setItem('favTacops', JSON.stringify(favTacOps));
                renderTacOps();
            };
        });
    </script>
</body>

</html>
